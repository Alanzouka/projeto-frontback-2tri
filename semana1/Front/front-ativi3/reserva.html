<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Reserva de Espaço da Escola</title>
</head>

<body>

    <div class="titulo">
        <h1>Reserva de Espaço da Escola</h1>
    </div>

    <a href="login.html" class="link">

        <div class="claro">

            <button class="cadastrar-tarefa-button">
                Login

            </button>

        </div>

    </a>


    <div class="form">
        <form action="#" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="turma">Turma:</label>
            <input type="text" id="turma" name="turma" required>

            <label for="horario">Horário:</label>
            <input type="time" id="horario" name="horario" required>

            <button type="submit" class="button2">Reservar</button>
        </form>
    </div>

    <style>
        .titulo {
            text-align: center;
            font-family: 'Chewy', cursive;
            font-size: 30px;
            color: #6131b9;
        }

        .form {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-family: 'Chewy', cursive;
            font-size: 16px;
            color: #6131b9;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .button2 {
            width: 200px;
            padding: 10px;
            background-color: #6131b9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cadastrar-tarefa-button {
            display: flex;
            justify-content: center;
            width: 200px;
            padding: 10px;
            background-color: #6131b9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .link {
            text-decoration: none;
        }
        .claro {
            display: flex;
            justify-content: center;
        }
    </style>

</body>

</html>
