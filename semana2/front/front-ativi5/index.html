<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }

    .menu {
      display: flex;
      justify-content: space-between;
      background-color: #222;
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 200px;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body>
  <div class="menu">
    <div>Sistema Escolar</div>
    <div>Início | Avisos | Tarefas | Sair</div>
  </div>

  <div class="cards">
    <div class="card">
      <h2>Avisos</h2>
      <p>3 avisos publicados.</p>
    </div>

    <div class="card">
      <h2>Tarefas</h2>
      <p>5 tarefas pendentes.</p>
    </div>

    <div class="card">
      <h2>Reservas</h2>
      <p>2 espaços reservados.</p>
    </div>
  </div>
</body>
</html>
