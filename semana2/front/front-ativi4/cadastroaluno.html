<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Luláticos</title>
</head>

<body>

    <div class="titulo">
        <h1>Cadastro</h1>
    </div>


    <div class=" form">
        <form action="#" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>

            <button type="submit" class="button2">Cadastrar</button>
        </form>
    </div>

    <style>
        .titulo {
            text-align: center;
            font-family: 'Chewy', cursive;
            font-size: 30px;
            color: #978c27;
        }

        .form {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-family: 'Chewy', cursive;
            font-size: 16px;
            color: #978c27;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .button2 {
            width: 100%;
            padding: 10px;
            background-color: #978c27;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .button2:hover {
            background-color: #7da2f0;
            /* Move o botão 5 pixels para cima */
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .button2:active {
            transform: translateY(0);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .cadastrar-tarefa-button {
            display: flex;
            justify-content: center;
            width: 200px;
            padding: 10px;
            background-color: #978c27;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .link {
            text-decoration: none;
        }

        .sim {
            display: flex;
            justify-content: center;
        }
    </style>

</body>

</html>
