!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato - Coordenação</title>
</head>
<body>

    <div class="titulo">
        <h1>Contato - Coordenação</h1>
    </div>

    <div class="form">
        <form action="#" method="post">
            <label for="assunto">Assunto:</label>
            <input type="text" id="assunto" name="assunto" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

            <button type="submit" class="button2">Enviar</button>
        </form>
    </div>

    <style>
        .titulo {
            text-align: center;
            font-family: 'Chewy', cursive;
            font-size: 30px;
            color: #6131b9;
        }

        .form {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-family: 'Chewy', cursive;
            font-size: 16px;
            color: #6131b9;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .button2 {
            width: 200px;
            padding: 10px;
            background-color: #6131b9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

</body>
</html>
