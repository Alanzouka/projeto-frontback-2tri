<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Tarefa - Luláticos</title>
</head>
<body>

    <div class="titulo">
        <h1>Cadastro de Tarefa</h1>
    </div>


    <a href="contato.html"link">
        <div class="nao">
             <button class="cadastrar-tarefa-button">
            Contato

        </button>

        </div>
       
    </a>

    <div class="form">
        <form action="#" method="post">
            <label for="titulo">Título:</label>
            <input type="text" id="titulo" name="titulo" required>

            <label for="descricao">Descrição:</label>
            <textarea id="descricao" name="descricao" required></textarea>

            <label for="prioridade">Prioridade:</label>
            <select id="prioridade" name="prioridade" required>
                <option value="baixa">Baixa</option>
                <option value="media">Média</option>
                <option value="alta">Alta</option>
            </select>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

    <style>
        .titulo {
            text-align: center;
            font-family: 'Chewy', cursive;
            font-size: 30px;
            color: #6131b9;
        }

        .form {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-family: 'Chewy', cursive;
            font-size: 16px;
            color: #6131b9;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #6131b9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button2 {
            width: 100%;
            padding: 10px;
            background-color: #6131b9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cadastrar-tarefa-button {
            display: flex;
            justify-content: center;
            width: 200px;
            padding: 10px;
            background-color: #6131b9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .link {
            text-decoration: none;
        }
        .nao {
            display: flex;
            justify-content: center;
        }

    
    </style>

</body>
</html>
